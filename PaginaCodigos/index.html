<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Code Hub | Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />

    <style>
    :root {
        --bg: #030712;
        --card-bg: #1e293b;
        --text: #f8fafc;
        --accent: #38bdf8;
        --java: #f89820;
        --python: #3776ab;
        --cpp: #00599c;
        --html: #e34f26;
    }

    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 0;
    }

    /* Fondo de partículas fijo detrás de todo */
    #particleCanvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1;
    }

    header {
        text-align: center;
        padding: 50px 20px;
        background: transparent;
    }

    h1 { font-size: 2.8rem; margin: 0; color: var(--accent); }
    .subtitle { color: #94a3b8; margin-top: 10px; font-size: 1.1rem; }

    /* Buscador compacto */
    .search-container {
        max-width: 600px;
        margin: -25px auto 40px;
        padding: 0 20px;
        position: relative;
        z-index: 10;
    }

    #searchInput {
        width: 100%;
        padding: 15px 25px;
        border-radius: 50px;
        border: 1px solid #334155;
        background: #1e293b;
        color: white;
        font-size: 1rem;
        outline: none;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    /* Grid de tarjetas COMPACTO (como el original) */
    .grid-secciones {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 25px;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        position: relative;
        z-index: 10;
    }

    .card {
        background: var(--card-bg);
        border-radius: 15px;
        padding: 20px;
        border: 1px solid #334155;
        display: flex;
        flex-direction: column;
        transition: all 0.3s ease;
    }

    .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }

    .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
    }

    .badge {
        padding: 5px 12px;
        border-radius: 6px;
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
    }

    h3 { margin: 10px 0; font-size: 1.3rem; }

    /* Estilo Prism y Bloques de Código */
    pre {
        border-radius: 10px;
        margin: 15px 0 !important;
        max-height: 300px;
        overflow: auto;
    }

    .btn-copy {
        background: #334155;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.2s;
    }

    .btn-copy:hover { background: var(--accent); color: #000; }

    footer { text-align: center; padding: 50px; color: #475569; }
</style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <header>
        <h1>CODE AP</h1>
        <p class="subtitle">Soluciones a medida, a un clic de distancia. Encuentra, copia y pega.</p>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Buscar por título o lenguaje...">
    </div>

    <main class="grid-secciones" id="codeGrid">
        </main>

    <footer> Hecho con ❤️ para mis clientes </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

    <script>
        // === AQUÍ AGREGAS TUS NUEVOS CÓDIGOS ===
        const MIS_CODIGOS = [
            {
    titulo: "Galaxia Ultra Realista (Canvas JS)",
    lenguaje: "html",
    color: "#0f172a", // Color oscuro como el espacio
    codigo: `
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GALAXIA ULTRA REALISTA</title>
<style>
    body{ margin:0; overflow:hidden; background:black; cursor:none; }
    canvas{ display:block; }
</style>
</head>
<body>
<canvas id="universe"></canvas>
<script>
const canvas = document.getElementById("universe");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let cx = canvas.width/2;
let cy = canvas.height/2;
let mouseX = cx;
let mouseY = cy;

class Star{
    constructor(){ this.reset(); }
    reset(){
        this.x = (Math.random()-0.5)*2000;
        this.y = (Math.random()-0.5)*2000;
        this.z = Math.random()*2000;
    }
    update(){
        this.z -= 4;
        if(this.z<=1) this.reset();
    }
    draw(){
        let sx = (this.x/this.z)*800 + cx;
        let sy = (this.y/this.z)*800 + cy;
        let size = (1-this.z/2000)*3;
        ctx.beginPath();
        ctx.arc(sx,sy,size,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();
    }
}

let stars=[];
for(let i=0;i<2000;i++) stars.push(new Star());

class GalaxyStar{
    constructor(){
        this.angle=Math.random()*Math.PI*2;
        this.radius=Math.random()*500;
        this.speed=0.0005+Math.random()*0.001;
        this.size=Math.random()*2;
    }
    update(){ this.angle+=this.speed; }
    draw(){
        let x=cx+Math.cos(this.angle)*this.radius;
        let y=cy+Math.sin(this.angle)*this.radius;
        let gradient=ctx.createRadialGradient(x,y,0,x,y,4);
        gradient.addColorStop(0,"white");
        gradient.addColorStop(1,"transparent");
        ctx.fillStyle=gradient;
        ctx.beginPath();
        ctx.arc(x,y,this.size+1,0,Math.PI*2);
        ctx.fill();
    }
}

let galaxy=[];
for(let i=0;i<1500;i++) galaxy.push(new GalaxyStar());

class Planet{
    constructor(radius,color,size,speed){
        this.angle=Math.random()*Math.PI*2;
        this.radius=radius;
        this.color=color;
        this.size=size;
        this.speed=speed;
    }
    update(){ this.angle+=this.speed; }
    draw(){
        let x=cx+Math.cos(this.angle)*this.radius;
        let y=cy+Math.sin(this.angle)*this.radius;
        let g=ctx.createRadialGradient(x,y,1,x,y,this.size);
        g.addColorStop(0,this.color);
        g.addColorStop(1,"black");
        ctx.fillStyle=g;
        ctx.beginPath();
        ctx.arc(x,y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

let planets=[
    new Planet(150,"cyan",8,0.01),
    new Planet(250,"purple",12,0.006),
    new Planet(350,"orange",16,0.004)
];

class ShootingStar{
    constructor(){ this.reset(); }
    reset(){
        this.x=Math.random()*canvas.width;
        this.y=0;
        this.len=200;
        this.speed=10+Math.random()*10;
        this.active=Math.random()<0.02;
    }
    update(){
        if(!this.active){
            if(Math.random()<0.002) this.active=true;
            return;
        }
        this.x+=this.speed;
        this.y+=this.speed;
        if(this.y>canvas.height){ this.reset(); }
    }
    draw(){
        if(!this.active) return;
        ctx.strokeStyle="white";
        ctx.lineWidth=2;
        ctx.beginPath();
        ctx.moveTo(this.x,this.y);
        ctx.lineTo(this.x-this.len,this.y-this.len);
        ctx.stroke();
    }
}

let meteors=[];
for(let i=0;i<5;i++) meteors.push(new ShootingStar());

document.addEventListener("mousemove",e=>{
    mouseX=e.clientX;
    mouseY=e.clientY;
});

function animate(){
    cx += (mouseX-cx)*0.02;
    cy += (mouseY-cy)*0.02;
    ctx.fillStyle="rgba(0,0,10,0.4)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{s.update();s.draw();});
    galaxy.forEach(g=>{g.update();g.draw();});
    planets.forEach(p=>{p.update();p.draw();});
    meteors.forEach(m=>{m.update();m.draw();});
    requestAnimationFrame(animate);
}
animate();

window.addEventListener("resize",()=>{
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
});
<\/script>
</body>
</html>`
},
            {
                titulo: "Ejemplo para Cliente Juan",
                lenguaje: "python",
                color: "#3776ab",
                codigo: `def saludar():\n    print("Hola Juan, aquí está tu código")\n\nsaludar()`
            },
            {
                titulo: "Estructura Base HTML",
                lenguaje: "html",
                color: "#e34f26",
                codigo: `<!DOCTYPE html>\n<html>\n<body>\n  <h1>Hola</h1>\n</body>\n</html>`
            },
            // Cuando quieras agregar uno nuevo, copias y pegas un bloque de estos aquí arriba.
        ];

        // Función para renderizar tarjetas
        function renderCodes() {
            const grid = document.getElementById('codeGrid');
            grid.innerHTML = '';

            MIS_CODIGOS.forEach((item, index) => {
                const id = `code-${index}`;
                const card = `
                    <div class="card" data-lang="${item.lenguaje}">
                        <div class="card-header">
                            <span class="badge" style="background: ${item.color}; color: white;">${item.lenguaje}</span>
                            <button class="btn-copy" onclick="copyCode('${id}', this)">Copiar</button>
                        </div>
                        <h3>${item.titulo}</h3>
                        <pre><code id="${id}" class="language-${item.lenguaje}">${item.codigo.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre>
                    </div>
                `;
                grid.innerHTML += card;
            });
            Prism.highlightAll();
        }

        // Función Copiar
        function copyCode(id, btn) {
            const code = document.getElementById(id).innerText;
            navigator.clipboard.writeText(code).then(() => {
                const oldText = btn.innerText;
                btn.innerText = "¡Copiado!";
                btn.style.background = "#22c55e";
                setTimeout(() => { btn.innerText = oldText; btn.style.background = ""; }, 2000);
            });
        }

        // Buscador
        document.getElementById('searchInput').addEventListener('keyup', function() {
            let filter = this.value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(filter) ? "flex" : "none";
            });
        });

        renderCodes();
    </script>
    <script>
    // --- SCRIPT DEL FONDO DE PARTÍCULAS ---
    const pCanvas = document.getElementById('particleCanvas');
    const pCtx = pCanvas.getContext('2d');

    pCanvas.width = window.innerWidth;
    pCanvas.height = window.innerHeight;

    let particles = [];
    const particleCount = 100; // Ajusta la cantidad de partículas
    const connectionDistance = 150; // Distancia máxima para conectar puntos

    class Particle {
        constructor() {
            this.x = Math.random() * pCanvas.width;
            this.y = Math.random() * pCanvas.height;
            this.size = Math.random() * 2 + 1;
            this.speedX = Math.random() * 0.5 - 0.25;
            this.speedY = Math.random() * 0.5 - 0.25;
        }

        update() {
            this.x += this.speedX;
            this.y += this.speedY;

            if (this.x > pCanvas.width) this.x = 0;
            else if (this.x < 0) this.x = pCanvas.width;
            if (this.y > pCanvas.height) this.y = 0;
            else if (this.y < 0) this.y = pCanvas.height;
        }

        draw() {
            pCtx.fillStyle = 'rgba(56, 189, 248, 0.7)'; // Color de la partícula (cian)
            pCtx.beginPath();
            pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            pCtx.fill();
        }
    }

    function initParticles() {
        particles = [];
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }
    }

    function animateParticles() {
        pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
        
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
            
            // Lógica de conexión
            for (let j = i; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < connectionDistance) {
                    pCtx.strokeStyle = `rgba(56, 189, 248, ${1 - distance/connectionDistance})`;
                    pCtx.lineWidth = 0.5;
                    pCtx.beginPath();
                    pCtx.moveTo(particles[i].x, particles[i].y);
                    pCtx.lineTo(particles[j].x, particles[j].y);
                    pCtx.stroke();
                }
            }
        }
        requestAnimationFrame(animateParticles);
    }

    initParticles();
    animateParticles();

    window.addEventListener('resize', () => {
        pCanvas.width = window.innerWidth;
        pCanvas.height = window.innerHeight;
        initParticles();
    });
</script>
</body>
</html>
